<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="theme-color" content="#ffffff"/>
    <title>ERP TechStore Colombia</title>
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/assets/img/app-favicon.svg">
    <!-- Google Fonts Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tabler CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/custom.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- JsBarcode para etiquetas de inventario -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  </head>
  <body class="layout-fluid">
    <div id="app" class="page">
      <!-- Spinner inicial — app.js lo reemplaza al cargar -->
      <div class="page-center">
        <div class="container text-center">
          <div class="mb-3">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
          <div class="text-secondary">Cargando sistema…</div>
        </div>
      </div>
    </div>

    <!-- Tabler Core JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <!-- App Entry Point: defer garantiza que el DOM está listo antes de ejecutar el módulo -->
    <script type="module" src="/assets/js/app.js" defer></script>
  </body>
</html>
